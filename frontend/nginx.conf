server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React Router 등 SPA 라우팅 지원 (404 에러 방지)
        try_files $uri $uri/ /index.html;

        # HTML 파일은 캐싱 방지하여 항상 최신 JS 번들을 받도록 유도
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }

    # API 요청을 백엔드 서버로 프록시 (동일 도메인 쿠키 공유용)
    location /api {
        proxy_pass https://forwarding-hub-backend-269919807885.asia-northeast3.run.app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host forwarding-hub-backend-269919807885.asia-northeast3.run.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io (WebSocket) 요청 프록시
    location /socket.io/ {
        proxy_pass https://forwarding-hub-backend-269919807885.asia-northeast3.run.app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host forwarding-hub-backend-269919807885.asia-northeast3.run.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}