name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} 
  # 프론트엔드는 도쿄와 서울 리전에 배포한다고 되어있었으므로, 일단 메인인 도쿄 또는 서울로 지정.
  REGION: asia-northeast1 # 도쿄 (서울인 경우 asia-northeast3 로 변경)
  SERVICE_NAME: forwarding-hub-frontend
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/forwarding-hub-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF 인증을 위해 필수

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/269919807885/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions-deploy@forwarding-hub-502407.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker Image
        run: 
          docker build 
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} 
            --build-arg VITE_KAKAO_REST_API_KEY=${{ secrets.VITE_KAKAO_REST_API_KEY }} 
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./frontend

      - name: Push Docker Image
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run (Tokyo)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated

      # 서울 리전에도 동시 배포하려면 아래 스텝 활성화 (memo.md 참고)
